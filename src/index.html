<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>LogicFit - نظام إدارة الصالات الرياضية</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LogicFit - نظام متكامل لإدارة الصالات الرياضية والمدربين والعملاء">
  <meta name="theme-color" content="#3b82f6">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Splash screen: shown until Angular renders over <app-root>. Because the
       markup lives INSIDE <app-root>, Angular clears it automatically on bootstrap
       (after the APP_INITIALIZER branding load), so it can never disappear early. -->
  <style>
    #app-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 45%, #3b82f6 100%);
      z-index: 99999;
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
    }
    #app-splash::before {
      content: '';
      position: absolute;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96,165,250,.35) 0%, transparent 65%);
      filter: blur(10px);
      animation: splash-pulse 2.4s ease-in-out infinite;
    }
    .splash-brand {
      position: relative;
      display: flex;
      align-items: center;
      gap: .85rem;
      color: #fff;
      z-index: 1;
    }
    .splash-mark {
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      animation: splash-bob 1.8s ease-in-out infinite;
    }
    .splash-mark svg { width: 34px; height: 34px; }
    .splash-word { font-size: 2.1rem; font-weight: 800; letter-spacing: .5px; }
    .splash-word span { opacity: .8; font-weight: 600; }

    .splash-ring {
      position: relative;
      width: 46px; height: 46px;
      z-index: 1;
    }
    .splash-ring div {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      animation: splash-spin 1s cubic-bezier(.5,0,.5,1) infinite;
    }
    .splash-ring div:nth-child(2) { inset: 7px; border-top-color: rgba(255,255,255,.5); animation-duration: 1.4s; animation-direction: reverse; }

    .splash-text { position: relative; z-index: 1; color: rgba(255,255,255,.75); font-size: .9rem; letter-spacing: 1px; }

    @keyframes splash-spin { to { transform: rotate(360deg); } }
    @keyframes splash-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes splash-pulse { 0%,100% { transform: scale(.9); opacity: .6; } 50% { transform: scale(1.05); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      #app-splash *, #app-splash::before { animation: none !important; }
    }
  </style>
</head>
<body class="antialiased">
  <app-root>
    <div id="app-splash">
      <div class="splash-brand">
        <div class="splash-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 6.5l11 11M4 9l-1.5 1.5a1.5 1.5 0 000 2.1L10.4 21a1.5 1.5 0 002.1 0L14 19.5M9 4l1.5-1.5a1.5 1.5 0 012.1 0L21 10.4a1.5 1.5 0 010 2.1L19.5 14"
              stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="splash-word">Logic<span>Fit</span></div>
      </div>
      <div class="splash-ring"><div></div><div></div></div>
      <div class="splash-text">جارٍ التحميل…</div>
    </div>
  </app-root>
</body>
</html>
